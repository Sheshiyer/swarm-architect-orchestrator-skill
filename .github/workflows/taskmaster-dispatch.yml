name: Taskmaster Dispatch

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: "Taskmaster Task-ID (e.g., T042)"
        required: true
        type: string
      mode:
        description: "Execution mode"
        required: true
        default: "analyze"
        type: choice
        options:
          - analyze
          - implement
          - verify
      notes:
        description: "Optional execution notes"
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      TASK_ID: ${{ inputs.task_id }}
      MODE: ${{ inputs.mode }}
      NOTES: ${{ inputs.notes }}
    steps:
      - name: Resolve task issue
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            const taskId = (process.env.TASK_ID || '').trim().toUpperCase();
            if (!taskId) {
              core.setFailed('TASK_ID input missing');
              return;
            }
            const {owner, repo} = context.repo;
            const q = `repo:${owner}/${repo} [${taskId}] in:title is:issue`;
            const result = await github.rest.search.issuesAndPullRequests({ q, per_page: 5 });
            const issue = result.data.items.find(i => i.title.includes(`[${taskId}]`));
            if (!issue) {
              core.setFailed(`No issue found for ${taskId}`);
              return;
            }
            core.info(`Resolved ${taskId} -> #${issue.number}`);
            core.setOutput('issue_number', String(issue.number));
      - name: Post dispatch start comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = Number('${{ steps.resolve.outputs.issue_number }}');
            const taskId = (process.env.TASK_ID || '').trim().toUpperCase();
            const mode = (process.env.MODE || '').trim() || 'analyze';
            const notes = (process.env.NOTES || '').trim() || 'none';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: [
                '🤖 **Taskmaster Dispatch Triggered**',
                `- Task-ID: ${taskId}`,
                `- Mode: ${mode}`,
                `- Notes: ${notes}`,
                `- Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });
      - name: Emit dispatch summary
        run: |
          echo "Task dispatch recorded for ${TASK_ID} in mode=${MODE}"

name: Taskmaster Milestone Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Build milestone digest
        uses: actions/github-script@v7
        with:
          script: |
            const {owner, repo} = context.repo;
            const title = 'MVP Orchestrator 2-3 Days';
            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner, repo, state: 'open', per_page: 100
            });
            const milestone = milestones.find(m => m.title === title);
            if (!milestone) {
              core.setFailed(`Milestone '${title}' not found`);
              return;
            }
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, milestone: milestone.number, state: 'all', per_page: 100
            });
            const open = issues.filter(i => !i.pull_request && i.state === 'open').length;
            const closed = issues.filter(i => !i.pull_request && i.state === 'closed').length;
            const total = open + closed;
            const pct = total ? ((closed / total) * 100).toFixed(1) : '0.0';

            const q = `repo:${owner}/${repo} \"Task-ID: T067\" in:body is:issue`;
            const search = await github.rest.search.issuesAndPullRequests({ q, per_page: 1 });
            if (!search.data.items.length) {
              core.warning('No digest anchor issue (T067) found.');
              return;
            }
            const issue_number = search.data.items[0].number;
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: [
                '📊 **Taskmaster Milestone Digest**',
                `- Milestone: ${title}`,
                `- Open: ${open}`,
                `- Closed: ${closed}`,
                `- Progress: ${pct}%`,
                `- Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`
              ].join('\n')
            });
